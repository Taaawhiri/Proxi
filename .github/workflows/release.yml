name: Release APK

# Si attiva sui tag di versione (es. v1.0.0) e sui push al branch "release".
on:
  push:
    tags:
      - "v*"
    branches:
      - release

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.6"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Test & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # --- Firma di produzione (opzionale) ---
      # Per compilare una APK firmata con la chiave di release invece di
      # quella di debug, configura i secrets del repository:
      #   ANDROID_KEYSTORE_BASE64  -> keystore.jks codificato in base64
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      # poi scommenta questo step e referenzia key.properties in
      # android/app/build.gradle.kts (signingConfigs.release).
      # - name: Decode Android signing keystore
      #   run: |
      #     echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks
      #     cat > android/key.properties <<EOF
      #     storeFile=release-key.jks
      #     storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      #     keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
      #     keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
      #     EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=build-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/proxi-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxi-apk
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Proxi ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*.apk
